<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alhera Football Fest</title><style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

.header{
background:white;
padding:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.header img{
max-width:240px;
}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

canvas{
width:100%;
border-radius:14px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
cursor:pointer;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

.controls button{
flex:1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.undo{background:#e0e0e0;}
.redo{background:#e0e0e0;}

.center{
background:#333;
color:white;
}

.download{
background:#00c853;
color:white;
font-weight:bold;
}

.counter{
margin-top:10px;
color:#ddd;
font-size:14px;
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.7;
}

.lights{
position:fixed;
top:-200px;
left:-200px;
width:150%;
height:150%;
background:radial-gradient(circle,#ffffff22 0%,transparent 60%);
animation:moveLights 8s linear infinite;
pointer-events:none;
}

@keyframes moveLights{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style></head><body><div class="lights"></div><div class="header">
<img src="logo.png">
</div><div class="container"><canvas id="canvas" width="800" height="800"></canvas>

<input type="file" id="upload" hidden><div class="controls">
<button class="undo" onclick="undo()">Undo</button>
<button class="redo" onclick="redo()">Redo</button>
</div><button class="center" onclick="autoCenter()">Auto Center</button>

<div class="counter">
Total Downloads: <span id="count">0</span>
</div><button class="download" onclick="download()">⬇ Download Photo</button>

<div class="footer">
Tap the frame to upload your photo
<br>
Alhera Football Fest © 2026
</div></div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let frame=new Image();
frame.src="frame.png";

let img=new Image();

let scale=1;
let posX=0;
let posY=0;

let history=[];
let redoStack=[];

let dragging=false;
let startX,startY;
let startDist=0;

let downloads=localStorage.getItem("downloads")||0;
document.getElementById("count").innerText=downloads;

canvas.onclick=()=>document.getElementById("upload").click();

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img=new Image();

img.onload=function(){

scale=1;
posX=0;
posY=0;

saveState();
draw();

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(img.src){

let w=canvas.width*scale;
let h=canvas.height*scale;

ctx.drawImage(img,posX,posY,w,h);

}

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

}

canvas.addEventListener("touchstart",function(e){

if(e.touches.length==1){

dragging=true;

startX=e.touches[0].clientX-posX;
startY=e.touches[0].clientY-posY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

canvas.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length==1 && dragging){

posX=e.touches[0].clientX-startX;
posY=e.touches[0].clientY-startY;

draw();

}

if(e.touches.length==2){

let newDist=getDistance(e.touches[0],e.touches[1]);

scale*=newDist/startDist;

startDist=newDist;

draw();

}

});

canvas.addEventListener("touchend",function(){

dragging=false;
saveState();

});

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;
let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

function saveState(){

history.push({scale,posX,posY});
redoStack=[];

}

function undo(){

if(history.length>1){

redoStack.push(history.pop());

let last=history[history.length-1];

scale=last.scale;
posX=last.posX;
posY=last.posY;

draw();

}

}

function redo(){

if(redoStack.length>0){

let state=redoStack.pop();

scale=state.scale;
posX=state.posX;
posY=state.posY;

history.push(state);

draw();

}

}

function autoCenter(){

scale=1;
posX=0;
posY=0;

draw();
saveState();

}

function download(){

let link=document.createElement("a");

link.download="alhera-football-fest.png";

link.href=canvas.toDataURL();

link.click();

downloads++;

localStorage.setItem("downloads",downloads);

document.getElementById("count").innerText=downloads;

}

</script></body>
</html>
