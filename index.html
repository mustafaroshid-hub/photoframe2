<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Alhera Football Fest</title><style>

body{
margin:0;
font-family:system-ui;
background:#e9e9e9;
text-align:center;
color:#111;
}

/* HEADER */

.header{
padding:30px 10px;
}

.logo{
height:70px;
padding:15px;
background:#e9e9e9;
border-radius:18px;
box-shadow:
8px 8px 16px #cfcfcf,
-8px -8px 16px #ffffff;
}

/* MAIN */

.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* CANVAS */

canvas{
width:100%;
border-radius:25px;
margin-top:15px;
}

/* UPLOAD */

.upload{
margin-top:20px;
padding:20px;
border-radius:20px;
background:#e9e9e9;

box-shadow:
8px 8px 16px #cfcfcf,
-8px -8px 16px #ffffff;
}

/* BUTTON ROW */

.row{
display:flex;
gap:12px;
margin-top:15px;
}

/* BUTTON */

.btn{
flex:1;
padding:15px;
border:none;
border-radius:40px;
font-size:15px;
background:#111;
color:white;
cursor:pointer;

box-shadow:
4px 4px 10px rgba(0,0,0,0.3),
-2px -2px 5px rgba(255,255,255,0.2);

transition:0.2s;
}

.btn:active{

transform:scale(0.96);

box-shadow:
inset 4px 4px 10px rgba(0,0,0,0.5),
inset -2px -2px 5px rgba(255,255,255,0.1);

}

.bigbtn{
width:100%;
margin-top:15px;
}

/* FACEBOOK */

.fb{

margin-top:30px;

padding:20px;

border-radius:20px;

background:#e9e9e9;

box-shadow:
8px 8px 16px #cfcfcf,
-8px -8px 16px #ffffff;

font-size:14px;

}

.fb a{

display:inline-block;

margin-top:10px;

background:#111;

color:white;

padding:10px 20px;

border-radius:30px;

text-decoration:none;

box-shadow:4px 4px 10px rgba(0,0,0,0.3);

}

</style></head><body><div class="header">
<img src="logo.png" class="logo">
</div><div class="container"><canvas id="canvas" width="800" height="800"></canvas>

<div class="upload">Upload your photo

<br><br>

<input type="file" id="upload"></div><div class="row"><button class="btn" onclick="undo()">Undo</button>

<button class="btn" onclick="redo()">Redo</button>

</div><button class="btn bigbtn" onclick="centerImage()">Auto Center</button>

<button class="btn bigbtn" onclick="download()">Download Photo</button>

<div class="fb">Follow Alhera Football Fest on Facebook

<br><a href="https://www.facebook.com/share/1E2pWE5mAb/" target="_blank">Follow Page

</a></div></div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let frame=new Image();
let img=new Image();

let scale=1;
let posX=0;
let posY=0;

let history=[];
let redoStack=[];

let dragging=false;
let startX,startY;
let startDist=0;

/* LOAD FRAME */

frame.src="frame.png";

frame.onload=function(){

draw();

}

/* UPLOAD PHOTO */

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img=new Image();

img.onload=function(){

scale=1;

posX=0;

posY=0;

saveState();

draw();

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(img.src){

let w=canvas.width*scale;

let h=canvas.height*scale;

ctx.drawImage(img,posX,posY,w,h);

}

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

}

/* TOUCH START */

canvas.addEventListener("touchstart",function(e){

if(e.touches.length==1){

dragging=true;

startX=e.touches[0].clientX-posX;

startY=e.touches[0].clientY-posY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

/* TOUCH MOVE */

canvas.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length==1 && dragging){

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

draw();

}

if(e.touches.length==2){

let newDist=getDistance(e.touches[0],e.touches[1]);

scale*=newDist/startDist;

startDist=newDist;

draw();

}

});

/* TOUCH END */

canvas.addEventListener("touchend",function(){

dragging=false;

saveState();

});

/* DISTANCE */

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;

let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

/* HISTORY */

function saveState(){

history.push({scale,posX,posY});

redoStack=[];

}

/* UNDO */

function undo(){

if(history.length>1){

redoStack.push(history.pop());

let last=history[history.length-1];

scale=last.scale;

posX=last.posX;

posY=last.posY;

draw();

}

}

/* REDO */

function redo(){

if(redoStack.length>0){

let state=redoStack.pop();

scale=state.scale;

posX=state.posX;

posY=state.posY;

history.push(state);

draw();

}

}

/* CENTER */

function centerImage(){

scale=1;

posX=0;

posY=0;

draw();

}

/* DOWNLOAD */

function download(){

let link=document.createElement("a");

link.download="alhera-football-fest.png";

link.href=canvas.toDataURL();

link.click();

}

</script></body></html>
