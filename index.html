<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Alhera Football Fest</title><style>

body{

margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
text-align:center;

}

/* HEADER */

.header{

padding:30px 10px;

}

.logo{

height:65px;
background:white;
padding:8px;
border-radius:12px;

}

/* MAIN */

.container{

max-width:500px;
margin:auto;
padding:20px;

}

/* FRAME */

canvas{

width:100%;
border-radius:20px;
background:black;

box-shadow:0 15px 40px rgba(0,0,0,0.6);

}

/* UPLOAD */

.upload{

margin-top:20px;

background:#1e293b;

padding:18px;

border-radius:14px;

}

/* BUTTONS */

.btn{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:40px;

font-size:15px;

background:#2563eb;

color:white;

cursor:pointer;

transition:0.2s;

}

.btn:hover{

transform:scale(1.03);

background:#1d4ed8;

}

/* BUTTON ROW */

.row{

display:flex;
gap:10px;

}

/* FACEBOOK */

.fb{

margin-top:25px;

background:#111827;

padding:18px;

border-radius:14px;

font-size:14px;

}

.fb a{

display:inline-block;

margin-top:10px;

background:#1877f2;

color:white;

padding:10px 18px;

border-radius:30px;

text-decoration:none;

font-size:14px;

}

</style></head><body><div class="header"><img src="logo.png" class="logo"></div><div class="container"><canvas id="canvas" width="800" height="800"></canvas>

<div class="upload">Upload your photo

<br><br>

<input type="file" id="upload"></div><div class="row"><button class="btn" onclick="undo()">Undo</button>

<button class="btn" onclick="redo()">Redo</button>

</div><button class="btn" onclick="centerImage()">Auto Center</button>

<button class="btn" onclick="download()">Download Photo</button>

<div class="fb">Follow Alhera Football Fest on Facebook

<br><a href="https://www.facebook.com/share/1E2pWE5mAb/" target="_blank">Follow Page

</a></div></div><script>

const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");

let frame=new Image();

let img=new Image();

let scale=1;

let posX=0;

let posY=0;

let history=[];

let redoStack=[];

let dragging=false;

let startX,startY;

let startDist=0;

/* PRELOAD FRAME */

frame.src="frame.png";

frame.onload=function(){

draw();

}

/* UPLOAD */

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img=new Image();

img.onload=function(){

scale=1;

posX=0;

posY=0;

saveState();

draw();

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(img.src){

let w=canvas.width*scale;

let h=canvas.height*scale;

ctx.drawImage(img,posX,posY,w,h);

}

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

}

/* TOUCH */

canvas.addEventListener("touchstart",function(e){

if(e.touches.length==1){

dragging=true;

startX=e.touches[0].clientX-posX;

startY=e.touches[0].clientY-posY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

canvas.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length==1 && dragging){

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

draw();

}

if(e.touches.length==2){

let newDist=getDistance(e.touches[0],e.touches[1]);

scale*=newDist/startDist;

startDist=newDist;

draw();

}

});

canvas.addEventListener("touchend",function(){

dragging=false;

saveState();

});

/* DISTANCE */

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;

let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

/* HISTORY */

function saveState(){

history.push({scale,posX,posY});

redoStack=[];

}

function undo(){

if(history.length>1){

redoStack.push(history.pop());

let last=history[history.length-1];

scale=last.scale;

posX=last.posX;

posY=last.posY;

draw();

}

}

function redo(){

if(redoStack.length>0){

let state=redoStack.pop();

scale=state.scale;

posX=state.posX;

posY=state.posY;

history.push(state);

draw();

}

}

/* CENTER */

function centerImage(){

scale=1;

posX=0;

posY=0;

draw();

}

/* DOWNLOAD */

function download(){

let link=document.createElement("a");

link.download="alhera-photo.png";

link.href=canvas.toDataURL();

link.click();

}

</script></body></html>
