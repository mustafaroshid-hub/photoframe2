<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Alhera Football Fest</title><style>

body{

margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
min-height:100vh;

}

/* HEADER */

.header{

text-align:center;
padding:25px;

}

.logo{

height:70px;

}

/* MAIN CARD */

.container{

max-width:520px;
margin:auto;

background:#e5e7eb;

padding:25px;

border-radius:25px;

box-shadow:

20px 20px 40px #111827,
-10px -10px 20px #374151;

}

/* CANVAS */

canvas{

width:100%;

border-radius:18px;

background:black;

margin-top:10px;

}

/* UPLOAD */

.upload{

margin-top:20px;

padding:20px;

border-radius:15px;

background:#e5e7eb;

box-shadow:

inset 6px 6px 10px #cbd5e1,
inset -6px -6px 10px white;

text-align:center;

}

/* BUTTONS */

.btn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:30px;

font-size:16px;

cursor:pointer;

background:#e5e7eb;

box-shadow:

8px 8px 15px #cbd5e1,
-8px -8px 15px white;

transition:0.2s;

}

.btn:active{

box-shadow:

inset 6px 6px 10px #cbd5e1,
inset -6px -6px 10px white;

}

/* ROW BUTTONS */

.row{

display:flex;

gap:10px;

}

</style></head><body><div class="header"><img src="logo.png" class="logo"></div><div class="container"><canvas id="canvas" width="800" height="800"></canvas>

<div class="upload">Upload your photo

<br><br>

<input type="file" id="upload"></div><div class="row"><button class="btn" onclick="undo()">Undo</button>

<button class="btn" onclick="redo()">Redo</button>

</div><button class="btn" onclick="centerImage()">Auto Center</button>

<button class="btn" onclick="download()">Download Photo</button>

</div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let frame=new Image();
let img=new Image();

let scale=1;
let posX=0;
let posY=0;

let history=[];
let redoStack=[];

let dragging=false;
let startX,startY;
let startDist=0;

/* PRELOAD FRAME */

frame.src="frame.png";

frame.onload=function(){

draw();

}

/* UPLOAD */

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img=new Image();

img.onload=function(){

scale=1;

posX=0;

posY=0;

saveState();

draw();

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

/* DRAW */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(img.src){

let w=canvas.width*scale;

let h=canvas.height*scale;

ctx.drawImage(img,posX,posY,w,h);

}

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

}

/* TOUCH START */

canvas.addEventListener("touchstart",function(e){

if(e.touches.length==1){

dragging=true;

startX=e.touches[0].clientX-posX;

startY=e.touches[0].clientY-posY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

/* TOUCH MOVE */

canvas.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length==1 && dragging){

posX=e.touches[0].clientX-startX;

posY=e.touches[0].clientY-startY;

draw();

}

if(e.touches.length==2){

let newDist=getDistance(e.touches[0],e.touches[1]);

scale*=newDist/startDist;

startDist=newDist;

draw();

}

});

/* TOUCH END */

canvas.addEventListener("touchend",function(){

dragging=false;

saveState();

});

/* DISTANCE */

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;

let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

/* HISTORY */

function saveState(){

history.push({scale,posX,posY});

redoStack=[];

}

function undo(){

if(history.length>1){

redoStack.push(history.pop());

let last=history[history.length-1];

scale=last.scale;
posX=last.posX;
posY=last.posY;

draw();

}

}

function redo(){

if(redoStack.length>0){

let state=redoStack.pop();

scale=state.scale;
posX=state.posX;
posY=state.posY;

history.push(state);

draw();

}

}

/* CENTER */

function centerImage(){

scale=1;

posX=0;

posY=0;

draw();

}

/* DOWNLOAD */

function download(){

let link=document.createElement("a");

link.download="alhera-photo.png";

link.href=canvas.toDataURL();

link.click();

}

</script></body></html>
