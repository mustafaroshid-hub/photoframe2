<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alhera Football Fest</title><style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
min-height:100vh;
color:white;
text-align:center;
}

/* header */

.header{
padding:20px;
}

.logo{
height:60px;
}

/* container */

.container{
max-width:520px;
margin:auto;
padding:20px;
}

/* canvas */

canvas{
width:100%;
border-radius:20px;
background:black;
box-shadow:
0 0 40px rgba(80,100,255,0.4);
}

/* upload box */

.upload{

margin-top:20px;

border:2px dashed rgba(255,255,255,0.3);

padding:20px;

border-radius:15px;

}

/* button style */

.btn{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:18px;

font-size:16px;

color:white;

cursor:pointer;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

box-shadow:

0 0 15px rgba(120,120,255,0.4),

inset 0 0 10px rgba(255,255,255,0.1);

transition:0.3s;

}

.btn:hover{

transform:scale(1.05);

box-shadow:

0 0 25px rgba(120,120,255,0.9),

inset 0 0 12px rgba(255,255,255,0.2);

}

/* row buttons */

.row{

display:flex;

gap:10px;

}

</style></head><body><div class="header"><img src="logo.png" class="logo"></div><div class="container"><canvas id="canvas" width="800" height="800"></canvas>

<div class="upload">Upload your photo

<br><br>

<input type="file" id="upload"></div><div class="row"><button class="btn" onclick="undo()">Undo</button>

<button class="btn" onclick="redo()">Redo</button>

</div><button class="btn" onclick="centerImage()">Auto Center</button>

<button class="btn" onclick="download()">Download</button>

</div><script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let frame=new Image();
let img=new Image();

let scale=1;
let posX=0;
let posY=0;

let history=[];
let redoStack=[];

let dragging=false;
let startX,startY;
let startDist=0;

/* preload frame */

frame.src="frame.png";

frame.onload=function(){

draw();

}

/* upload photo */

document.getElementById("upload").addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(event){

img=new Image();

img.onload=function(){

scale=1;
posX=0;
posY=0;

saveState();

draw();

}

img.src=event.target.result;

}

reader.readAsDataURL(e.target.files[0]);

});

/* draw */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(img.src){

let w=canvas.width*scale;
let h=canvas.height*scale;

ctx.drawImage(img,posX,posY,w,h);

}

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

}

/* touch start */

canvas.addEventListener("touchstart",function(e){

if(e.touches.length==1){

dragging=true;

startX=e.touches[0].clientX-posX;
startY=e.touches[0].clientY-posY;

}

if(e.touches.length==2){

startDist=getDistance(e.touches[0],e.touches[1]);

}

});

/* touch move */

canvas.addEventListener("touchmove",function(e){

e.preventDefault();

if(e.touches.length==1 && dragging){

posX=e.touches[0].clientX-startX;
posY=e.touches[0].clientY-startY;

draw();

}

if(e.touches.length==2){

let newDist=getDistance(e.touches[0],e.touches[1]);

scale*=newDist/startDist;

startDist=newDist;

draw();

}

});

/* touch end */

canvas.addEventListener("touchend",function(){

dragging=false;

saveState();

});

/* distance */

function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;
let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}

/* history */

function saveState(){

history.push({scale,posX,posY});

redoStack=[];

}

function undo(){

if(history.length>1){

redoStack.push(history.pop());

let last=history[history.length-1];

scale=last.scale;
posX=last.posX;
posY=last.posY;

draw();

}

}

function redo(){

if(redoStack.length>0){

let state=redoStack.pop();

scale=state.scale;
posX=state.posX;
posY=state.posY;

history.push(state);

draw();

}

}

/* center */

function centerImage(){

scale=1;
posX=0;
posY=0;

draw();

}

/* download */

function download(){

let link=document.createElement("a");

link.download="alhera-photo.png";

link.href=canvas.toDataURL();

link.click();

}

</script></body></html>
